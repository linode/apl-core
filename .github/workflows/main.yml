name: Build and publish Docker
on:
  push:
    branches-ignore:
      - 'releases/**'
    tags-ignore:
      - '*'
  workflow_dispatch: ~
env:
  CACHE_REGISTRY: ghcr.io
  CACHE_REPO: linode/apl-core
  REPO: linode/apl-core
  DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_LINODEBOT_TOKEN }}
  DOCKER_USERNAME: ${{ vars.DOCKERHUB_LINODEBOT_USERNAME }}
  BOT_EMAIL: ${{ vars.BOT_EMAIL }}
  BOT_USERNAME: ${{ vars.BOT_USERNAME }}
  COMMIT_SHA: ${{ github.sha }}

jobs:
  build-test-cache:
    if: (!contains(github.event.head_commit.message, 'ci skip') && !startsWith(github.ref, 'refs/tags/') && !github.event.act && github.repository == 'linode/apl-core')
    runs-on: ubuntu-22.04
    steps:
      - name: Set env
        run: |
          tag=${GITHUB_REF##*/}
          echo "Creating tag: $tag"
          echo "TAG=$tag" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            revision=${{ env.COMMIT_SHA }}
            echo "Setting apps revision to: $revision"
            echo "APPS_REVISION=$revision" >> $GITHUB_ENV
          else
            echo "Leaving apps revision empty"
          fi
          git config --global user.email $BOT_EMAIL
          git config --global user.name $BOT_USERNAME

      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Github Packages
        uses: docker/login-action@v4
        with:
          registry: ${{ env.CACHE_REGISTRY }}
          username: ${{ env.BOT_USERNAME }}
          password: '${{ secrets.BOT_TOKEN }}'
      - name: CI tests, image build and push tag for main or branch
        uses: docker/build-push-action@v7
        with:
          push: true
          build-args: |
            APPS_REVISION=${{ env.APPS_REVISION }}
          context: .
          tags: |
            ${{ env.CACHE_REGISTRY }}/${{ env.CACHE_REPO }}:${{ env.TAG }}

  push-to-docker:
    needs: build-test-cache
    if: always() && ((contains(needs.build-test-cache.result, 'success') && !contains(needs.integration.outputs.started, 'true')) || (contains(needs.integration.result, 'success'))) && !github.event.act && github.actor != 'dependabot[bot]' && github.repository == 'linode/apl-core'
    runs-on: ubuntu-22.04
    steps:
      - name: Push to docker hub
        run: |
          set -u
          TAG=${GITHUB_REF##*/}
          docker login ghcr.io -u $BOT_USERNAME -p ${{ secrets.BOT_TOKEN }}
          image="$CACHE_REGISTRY/$CACHE_REPO:$TAG"
          docker pull $image
          docker tag $image $REPO:$TAG
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
          docker push $REPO:$TAG
      - name: Show me the logic
        run: |
          echo github.ref == ${{ github.ref }}
  deploy-to-dev:
    needs: push-to-docker
    if: always() && (startsWith(github.ref, 'refs/heads/main')) && !github.event.act
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install the Linode CLI
        uses: linode/action-linode-cli@v1
        with:
          token: ${{ secrets.LINODE_TOKEN }}
      - name: Deploy to dev
        env:
          DEV_CLUSTER_ID: ${{ secrets.DEV_CLUSTER_ID }}
          LKE_CP_ACL_IPV4: ${{ secrets.LKE_CP_ACL_IPV4 }}
        run: ci/scripts/trigger_dev.sh
