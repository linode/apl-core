kind: AplApp
metadata:
    name: trivy
spec:
    _rawValues: {}
    enabled: true
    operator:
        replicaCount: 1
    resources:
        operator:
            limits:
                cpu: "1"
                memory: 1Gi
            requests:
                cpu: 10m
                memory: 512Mi
        trivy:
            limits:
                cpu: "1"
                memory: 1G
            requests:
                cpu: 10m
                memory: 128M
