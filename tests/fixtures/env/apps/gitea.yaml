kind: AplApp
metadata:
    name: gitea
spec:
    _rawValues:
        global:
            storageClass: linode-block-storage-retain
        giteaBackup:
            storageClassName: linode-block-storage-retain
    enabled: true
    resources:
        gitea:
            limits:
                cpu: "1"
                memory: 1Gi
            requests:
                cpu: 100m
                memory: 256Mi
        init:
            limits:
                cpu: 400m
                memory: 256Mi
            requests:
                cpu: 100m
                memory: 128Mi
