kind: AplApp
metadata:
    name: otel
    labels: {}
spec:
    _rawValues: {}
    enabled: true
    operator:
        replicaCount: 1
    resources:
        kubeRBACProxy:
            limits:
                cpu: 500m
                memory: 128Mi
            requests:
                cpu: 5m
                memory: 64Mi
        manager:
            limits:
                cpu: 200m
                memory: 512Mi
            requests:
                cpu: 50m
                memory: 16Mi
