apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  name: alerts-secrets
  namespace: apl-secrets
spec:
  encryptedData:
    slack_url: https://hooks.slack.com/services/id
    msteams_highPrio: https://xxxxxxx.com
    msteams_lowPrio: https://xxxxxxxx.com
  template:
    immutable: false
    metadata:
      name: alerts-secrets
      namespace: apl-secrets
    type: kubernetes.io/opaque
