kind: AplTeamService
metadata:
    name: hello
    labels:
        apl.io/teamId: demo
spec:
    cname:
        domain: hello-demo.cname.com
        tlsSecretName: "hello-crt"
    headers:
        response:
            set:
                - name: X-Frame-Options
                  value: same-origin
                - name: sander
                  value: same-origin
    ksvc:
        predeployed: true
    port: 80
    trafficControl:
        enabled: true
        weightV1: 70
        weightV2: 30
    useCname: true
    namespace: should-be-ignored
