kind: AplCapabilitySet
metadata:
    name: otomi
spec:
    aiEnabled: true
    globalPullSecret:
        username: otomi
    hasExternalDNS: true
    hasExternalIDP: false
    isMultitenant: true
    isPreInstalled: true
    nodeSelector:
        otomi: otomi-sys
    useORCS: false
    version: main
