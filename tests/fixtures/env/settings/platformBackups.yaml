kind: AplBackupCollection
metadata:
    name: platformBackups
spec:
    database:
        gitea:
            enabled: true
            pathSuffix: gitea
            retentionPolicy: 7d
            schedule: 0 0 * * *
        harbor:
            enabled: true
            externalClusters:
                - barmanObjectStore:
                      data:
                          compression: gzip
                      destinationPath: s3://my-clusterid-harbor/harbor
                      endpointURL: https://nl-ams-1.linodeobjects.com
                      s3Credentials:
                          accessKeyId:
                              key: S3_STORAGE_ACCOUNT
                              name: linode-creds
                          secretAccessKey:
                              key: S3_STORAGE_KEY
                              name: linode-creds
                      serverName: harbor-otomi-db
                      wal:
                          compression: gzip
                          maxParallel: 8
                  name: harbor-backup
            pathSuffix: harbor-1
            recovery:
                database: registry
                owner: harbor
                source: harbor-backup
            retentionPolicy: 7d
            schedule: 0 0 * * *
        keycloak:
            enabled: true
            pathSuffix: keycloak-1
            recovery:
                backup:
                    name: keycloak-backup
                database: keycloak
                owner: keycloak
            retentionPolicy: 7d
            schedule: 0 0 * * *
    gitea:
        enabled: true
        retentionPolicy: 7d
        schedule: 0 0 * * *
