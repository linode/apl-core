kind: AplIngress
metadata:
    name: ingress
spec:
    classes:
        - annotations:
              - key: service.beta.kubernetes.io/do-loadbalancer-enable-proxy-protocol
                value: true
          className: net-a
          entrypoint: 11.0.1.1
          loadBalancerIP: 11.0.0.1
          sourceIpAddressFiltering: 10.0.0.0/24
    platformClass:
        className: platform
        entrypoint: ""
        gateway:
            resources:
                limits:
                    cpu: 2000m
                    memory: 2048Mi
                requests:
                    cpu: 200m
                    memory: 256Mi
