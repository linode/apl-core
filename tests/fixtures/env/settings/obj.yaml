kind: AplObjectStorage
metadata:
    name: obj
spec:
    provider:
        linode:
            accessKeyId: someaccessKeyId
            buckets:
                cnpg: my-clusterid-cnpg
                gitea: my-clusterid-gitea
                harbor: my-clusterid-harbor
                kubeflow-pipelines: my-clusterid-kubeflow-pipelines
                loki: my-clusterid-loki
            region: nl-ams-1
        type: linode
