kind: AplDatabase
metadata:
    name: gitea
spec:
    externalClusters: []
    recovery: {}
    replicas: 2
    resources:
        limits:
            cpu: 200m
            memory: 192Mi
        requests:
            cpu: 200m
            memory: 192Mi
    size: 5Gi
    storageClass: linode-block-storage-retain
