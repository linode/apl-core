          gitea:
            title: Gitea
            properties:
              enabled:
                type: boolean
                default: false
              retentionPolicy:
                $ref: 'values-schema/definitions.yaml#/definitions/backupRetentionPolicy'
              schedule:
                $ref: 'values-schema/definitions.yaml#/definitions/backupSchedule'
              pathSuffix:
                type: string
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])$'
                default: gitea
          keycloak:
            title: Keycloak
            properties:
              enabled:
                type: boolean
                default: false
              retentionPolicy:
                $ref: 'values-schema/definitions.yaml#/definitions/backupRetentionPolicy'
              schedule:
                $ref: 'values-schema/definitions.yaml#/definitions/backupSchedule'
              pathSuffix:
                type: string
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])$'
                default: keycloak
      gitea:
        type: object
        title: Gitea
        description: Enable application-level backup of Gitea repositories and database
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: false
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
          retentionPolicy:
            $ref: 'values-schema/definitions.yaml#/definitions/backupRetentionPolicy'
          schedule:
            $ref: 'values-schema/definitions.yaml#/definitions/backupSchedule'
  obj:
    properties:
      showWizard:
        type: boolean
