      gitea:
        title: gitea
        properties:
          size:
            type: string
          walStorageSize:
            type: string
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
          backupSidecarResources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
          postgresqlParameters:
            type: object
            additionalProperties:
              type: string
            default: {}
          replicas:
            type: integer
            default: 2
          recovery:
            type: object
            additionalProperties: true
            default: {}
          externalClusters:
            type: array
            items:
              type: object
              additionalProperties: true
            default: []
  teamConfig:
    additionalProperties: false
