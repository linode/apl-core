$schema: 'http://json-schema.org/draft-07/schema'
version: 3
additionalProperties: true

properties:
  alerts:
    $ref: 'values-schema/definitions.yaml#/definitions/alerts'
  installation:
    type: object
    description: Top-level installation settings.
    required:
      - mode
    additionalProperties: true
    properties:
      mode:
        type: string
        description: |
          Installation execution mode.
          - `standard`: runs the normal installation workflow and follows the configuration bootstrap process.
          - `recovery`: runs recovery behavior intended to restore configuration that is stored in external git repository. It neither bootstraps nor initializes the configuration. For this mode `git` and `kms` objects are required so the operator knows how access and decrypt the data.
        enum:
          - recovery
          - standard
        default: standard
  azure:
    description: Azure specific configuration.
    properties:
      storageType:
        properties:
          fast:
            type: string
          standard:
            type: string
      appgw:
        properties:
          isManaged:
            default: false
            description: Indicates Azure Application Gateway Ingress Controller add-on is installed by AKS.
            type: boolean
  apps:
    additionalProperties: true
    properties:
      alertmanager:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          image:
            $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
          resources:
            properties:
              alertmanger:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      argocd:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          controllerStatusProcessors:
            default: 20
            type: integer
          controllerOperationProcessors:
            default: 10
            type: integer
          applicationSet:
            replicas:
              default: 1
              type: integer
          controller:
            replicas:
              default: 1
              type: integer
          autoscaling:
            repoServer:
              $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
            server:
              $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
          resources:
            additionalProperties: false
            properties:
              server:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              controller:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              repo:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              redis:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              applicationSet:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              notifications:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              imageUpdater:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      cert-manager:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            certManager:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            startupapicheck:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            cainjector:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            webhook:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
          byoWildcardCert:
            description: 'Bring your own trusted wildcard certificate. Only applicable for byo-wildcard-cert issuer'
            type: string
          byoWildcardCertKey:
            description: 'A certificate key corresponding to the byoWildcardCert.'
            type: string
            x-secret: ''
          externallyManagedTlsSecretName:
            description: |
              The name of a custom secret in the istio-system namespace that contains a trusted certificate and private key.
              To be used with issuer externally-managed-tls-secret.
            $ref: 'values-schema/definitions.yaml#/definitions/idName'
          customRootCA:
            x-secret: ''
            type: string
            description: CA that is used to create and verify self-signed certificates. Leave it empty to generate one automatically.
          customRootCAKey:
            x-secret: ''
            type: string
            description: CA private key that is used to issue certificates. Leave it empty to generate one automatically.
          email:
            $ref: 'values-schema/definitions.yaml#/definitions/email'
          issuer:
            description: |
              Indicates the origin of the wildcard certificate.
              The custom-ca - cert-manager uses the customRootCA to generate wildcard certificate.
              The letsencrypt - cert-manager requests certificate from letsencrypt endpoint.
              The byo-wildcard-cert allows users to bring their own trusted wildcard certificate (cert-manager not involved)
              through the values byoWildcardCert and byoWildcardCertKey.
              The externally-managed-tls-secret is similar to byo-wildcard-cert, but assumes the certificate is already stored
              in a secret (referenced by externallyManagedTlsSecretName) and not provided through the values.
            type: string
            enum:
              - custom-ca
              - letsencrypt
              - byo-wildcard-cert
              - externally-managed-tls-secret
            default: custom-ca
          stage:
            type: string
            enum:
              - production
              - staging
            default: production
      cnpg:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
          barmanPluginResources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
          useBackupPlugin:
            type: boolean
            default: false
            description: Use CNPG plugin for platform database backups
      external-dns:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          logLevel:
            type: string
            default: 'info'
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
      gitea:
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
          postgresqlPassword:
            type: string
            description: This password was generated and cannot be changed without manual intervention.
            x-secret: '{{ randAlphaNum 20 }}'
            readOnly: true
          databaseMaxConnections:
            type: number
            description: Maximum amount of total connections of the application to the database server
          databaseMaxIdleConnections:
            type: number
            description: Maximum amount of idle connections of the application to the database server
          resources:
            additionalProperties: false
            properties:
              gitea:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              init:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
          networkPolicies:
            $ref: 'values-schema/definitions.yaml#/definitions/appNetworkPolicyConfig'
      grafana:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          adminPassword:
            type: string
            x-secret: ''
          image:
            $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
          resources:
            grafana:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            sidecar:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
      harbor:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: true
          privateLibrary:
            type: boolean
            default: true
            description: Will mark the main project named "library" as private.
          adminPassword:
            type: string
            x-secret: ''
          oidcAutoOnboard:
            type: boolean
          oidcUserClaim:
            type: string
          core:
            properties:
              secret:
                type: string
                x-secret: '{{ randAlphaNum 16 }}'
              xsrfKey:
                type: string
                x-secret: '{{ randAlphaNum 32 }}'
          jobservice:
            properties:
              secret:
                type: string
                x-secret: '{{ randAlphaNum 16 }}'
          registry:
            properties:
              secret:
                type: string
                x-secret: '{{ randAlpha 16 }}'
              credentials:
                properties:
                  htpasswd:
                    type: string
                    x-secret: ''
                  username:
                    type: string
                    $ref: 'values-schema/definitions.yaml#/definitions/secretTemplates/definitions/otomiAdminUsername'
                  password:
                    type: string
                    x-secret: '{{ randAlphaNum 32 }}'
            required:
              - secret
              - credentials
          databaseMaxConnections:
            type: number
            description: Maximum amount of total connections of the application to the database server
          databaseMaxIdleConnections:
            type: number
            description: Maximum amount of idle connections of the application to the database server
          resources:
            additionalProperties: false
            properties:
              core:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              jobservice:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              portal:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              redis:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              registry:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              registryController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              trivy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              nginx:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
          secretKey:
            type: string
            x-secret: '{{ randAlpha 16 }}'
      ingress-nginx-platform:
        $ref: 'values-schema/definitions.yaml#/definitions/ingressNginx'
      istio:
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          tracing:
            description: Configure Istio for tracing. Requires Otel Collector to be enabled.
            properties:
              enabled:
                default: false
                type: boolean
              samplingRatio:
                type: string
                default: '0.01'
          autoscaling:
            properties:
              egressgateway:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscaling'
              ingressgateway:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscaling'
              pilot:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscaling'
          egressGateway:
            properties:
              enabled:
                default: false
                type: boolean
          global:
            additionalProperties: false
            properties:
              logging:
                properties:
                  level:
                    type: string
          extensionProviders:
            description: 'See: https://istio.io/latest/docs/reference/config/istio.mesh.v1alpha1/#MeshConfig'
            type: array
            items:
              type: object
          image:
            $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
          resources:
            properties:
              egressgateway:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              ingressgateway:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              ingressgateway-private:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              pilot:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              proxy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      keycloak:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          idp:
            additionalProperties: false
            properties:
              alias:
                type: string
                default: otomi-idp
              clientID:
                $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
                default: otomi
              clientSecret:
                type: string
                x-secret: '{{ randAlphaNum 32 }}'
          adminPassword:
            type: string
            x-secret: ''
          adminUsername:
            type: string
          theme:
            type: string
            default: otomi
          image:
            properties:
              keycloak:
                $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
              postgresql:
                $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
          databaseMaxConnections:
            type: number
            description: Maximum amount of total connections of the application to the database server
          databaseMinConnections:
            type: number
            description: Minimum amount of connections of the application to the database server
          databaseInitialConnections:
            type: number
            description: Initial amount of connections of the application to the database server on startup
          resources:
            additionalProperties: false
            properties:
              keycloak:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      kserve:
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: false
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              controller:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              rbacProxy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              inferenceService:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      kyverno:
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: false
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          mode:
            type: string
            enum: ['DevTest', 'Prod']
            default: DevTest
          resources:
            additionalProperties: false
            properties:
              admissionController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              cleanupController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              backgroundController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              reportsController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      policy-reporter:
        additionalProperties: false
        properties:
          enabled:
            type: boolean
            default: false
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
      knative:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: true
          resources:
            queueSidecar:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            controller:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            activator:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            webhook:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            autoscaler:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            autoscalerHpa:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            operator:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
            operatorWebhook:
              $ref: 'values-schema/definitions.yaml#/definitions/resources'
          serving:
            type: object
            properties:
              replicas:
                default: 1
                type: integer
                minimum: 1
              gateway:
                type: object
                description: 'Knative local gateway deployment configuration'
                properties:
                  replicas:
                    type: integer
                    minimum: 1
                  minAvailable:
                    type: integer
                    minimum: 1
                  resources:
                    $ref: 'values-schema/definitions.yaml#/definitions/resources'
                  autoscaling:
                    $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
      kubeflow-pipelines:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            default: false
            type: boolean
          persistence:
            properties:
              mysql:
                properties:
                  size:
                    default: 20Gi
                    $ref: 'values-schema/definitions.yaml#/definitions/size'
          rootPassword:
            type: string
            x-secret: '{{ randAlphaNum 32 }}'
          resources:
            additionalProperties: false
            properties:
              cacheDeployer:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              cacheServer:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              metadataEnvoy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              metadataGrpc:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              metadataWriter:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mlPipeline:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mlPipelinePersistenceagent:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mlPipelineScheduledworkflow:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mlPipelineUi:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mlPipelineViewer:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mlPipelineVisualizationserver:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              mysql:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              workflowController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      linode-cfw:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
      sealed-secrets:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      tekton:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              dashboard:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              pipelinesController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              pipelinesRemoteresolver:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              pipelinesEvents:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              pipelinesWebhook:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              triggersInterceptors:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              triggersController:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              triggersWebhook:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      loki:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          resources:
            additionalProperties: false
            properties:
              compactor:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              ingester:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              gateway:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              querier:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              distributor:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              queryFrontend:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              reverseProxy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              queryScheduler:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              indexGateway:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              singleBinary:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
          autoscaling:
            properties:
              ingester:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
              gateway:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
              querier:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
              distributor:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
              queryFrontend:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
              queryScheduler:
                $ref: 'values-schema/definitions.yaml#/definitions/autoscalingEnabled'
          adminPassword:
            type: string
            x-secret: '{{ randAlphaNum 20 }}'
          persistentVolumeSize:
            $ref: 'values-schema/definitions.yaml#/definitions/size'
          v13SchemaStartDate:
            description: Automatically set to a date in the future in case of an upgrade
            title: Schema v13 start date
            type: string
          enableOpenTelemetry:
            description: Use OpenTelemetry for logs instead of Promtail. True by default, but must be manually set after v13SchemaStartDate in case of an upgrade
            title: Enable OpenTelemetry for logs
            type: boolean
        required:
          - adminPassword
      metrics-server:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: true
          apiServer:
            additionalProperties: false
            properties:
              create:
                type: boolean
                default: true
          extraArgs:
            type: array
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
      oauth2-proxy:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          config:
            properties:
              cookieSecret:
                description: Cookie secret must be 32 byte base64 encoded string.
                pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
                type: string
                x-secret: '{{ randAlphaNum 32 | b64enc }}'
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
      oauth2-proxy-redis:
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          password:
            type: string
            x-secret: '{{ randAlpha 24 }}'
          resources:
            additionalProperties: false
            properties:
              master:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              sentinel:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
          replicas:
            type: integer
          persistentVolumeSize:
            $ref: 'values-schema/definitions.yaml#/definitions/size'
        type: object
      otomi-api:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          editorInactivityTimeout:
            type: integer
            default: 10
          resources:
            additionalProperties: false
            properties:
              api:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              tools:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
          networkPolicies:
            $ref: 'values-schema/definitions.yaml#/definitions/appNetworkPolicyConfig'
      otomi-console:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
        allOf:
          - anyOf:
              - not:
                  properties:
                    enabled:
                      const: true
                  required:
                    - enabled
              - properties:
                  registry:
                    required:
                      - username
                      - password
        type: object
      otomi-operator:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      apl-harbor-operator:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      apl-gitea-operator:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      apl-keycloak-operator:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      apl-operator:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          resources:
            additionalProperties: false
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      prometheus:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          disabledRules:
            type: array
            items:
              type: string
          remoteWrite:
            properties:
              enabled:
                type: boolean
                default: false
              insecureSkipVerify:
                type: boolean
                default: false
              rwConfig:
                properties:
                  target:
                    type: string
                  basicAuth:
                    properties:
                      enabled:
                        type: boolean
                        default: false
                      username:
                        type: string
                      password:
                        $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
                        x-secret: ''
                  customConfig:
                    description: Custom remote write config. Will be appended to the remoteWrite list.
                    type: string
          replicas:
            type: integer
            default: 1
          scrapeInterval:
            type: string
            default: 60s
          retention:
            $ref: 'values-schema/definitions.yaml#/definitions/duration'
          retentionSize:
            description: 'The maximum number of bytes of storage blocks to retain. The oldest data will be removed first. Defaults to 0 or disabled. Units supported: B, KB, MB, GB, TB, PB, EB'
            default: 4GB
            pattern: '^([0-9]+\.)?[0-9]+(B|KB|MB|GB|TB|PB|EB)?$'
          storageSize:
            $ref: 'values-schema/definitions.yaml#/definitions/size'
            default: 5Gi
          image:
            properties:
              prometheus:
                $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
              kube-state-metrics:
                $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
              node-exporter:
                $ref: 'values-schema/definitions.yaml#/definitions/imageSimple'
          resources:
            properties:
              prometheusOperator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              prometheus:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              kube-state-metrics:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              node-exporter:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              prometheusConfigReloader:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      promtail:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          resources:
            $ref: 'values-schema/definitions.yaml#/definitions/resources'
      rabbitmq:
        additionalProperties: false
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          resources:
            properties:
              clusterOperator:
                description: Controller which is used to create RabbitMQ-clusters
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              msgTopologyOperator:
                description: Controller which is used to create RabbitMQ queues and policies
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      trivy:
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          operator:
            properties:
              replicaCount:
                description: Number of Operator replicas.
                type: integer
                default: 1
          resources:
            additionalProperties: false
            properties:
              operator:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              trivy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
      otel:
        properties:
          _rawValues:
            $ref: 'values-schema/definitions.yaml#/definitions/rawValues'
          enabled:
            type: boolean
            default: false
          otlpCollector:
            properties:
              autoscaler:
                properties:
                  maxReplicas:
                    type: integer
                    default: 5
                  minReplicas:
                    type: integer
                    default: 2
                  targetCPUUtilizationPercentage:
                    type: integer
                    default: 80
                  targetMemoryUtilizationPercentage:
                    type: integer
                    default: 80
              attributes:
                type: array
                title: Kubernetes Attributes
                $ref: 'values-schema/definitions.yaml#/definitions/labelsAnnotations'
                description: 'Attributes to extract metadata from pods'
          operator:
            properties:
              replicaCount:
                description: Number of replicas.
                type: integer
                default: 1
          resources:
            additionalProperties: false
            properties:
              otlpCollector:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              logsCollector:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              manager:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
              kubeRBACProxy:
                $ref: 'values-schema/definitions.yaml#/definitions/resources'
    patternProperties:
      '^ingress-nginx-[a-z0-9]([-a-z0-9]*[a-z0-9])+$':
        $ref: 'values-schema/definitions.yaml#/definitions/ingressNginx'
  catalogs:
    type: object
    additionalProperties:
      $ref: 'values-schema/definitions.yaml#/definitions/catalog'
  cluster:
    $ref: 'values-schema/definitions.yaml#/definitions/cluster'
  dns:
    additionalProperties: false
    properties:
      zones:
        description: Extra dns zones that the cluster can administer. Team services can use this to publish their URLs on.
        items:
          $ref: 'values-schema/definitions.yaml#/definitions/domain'
        type: array
      domainFilters:
        description: Limit possible target zones by domain suffixes.
        items:
          type: string
        type: array
      zoneIdFilters:
        description: Limit possible target zones by zone id.
        items:
          type: string
        type: array
      policy:
        description: Modify how DNS records are synchronized between sources and providers.
        type: string
        enum:
          - upsert-only
          - sync
      provider:
        description: The DNS provider managing the domains.
        oneOf:
          - title: Akamai EdgeDNS
            additionalProperties: false
            properties:
              akamai:
                $ref: 'values-schema/definitions.yaml#/definitions/akamai/definitions/dns'
            required:
              - akamai
          - title: AWS
            description: Uses credentials when either a pair of id+key or a secret name is provided. Assumes node role otherwise.
            additionalProperties: false
            properties:
              aws:
                properties:
                  credentials:
                    properties:
                      secretKey:
                        $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/secretKey'
                      accessKey:
                        $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/accessKey'
                    required: [secretKey, accessKey]
                  region:
                    $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/region'
                  role:
                    $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/role'
                required: [region]
                oneOf:
                  - required: [credentials]
                  - required: [role]
                  - not:
                      anyOf:
                        - required: [credentials]
                        - required: [role]
            required:
              - aws
          - title: Azure
            additionalProperties: false
            properties:
              azure:
                $ref: 'values-schema/definitions.yaml#/definitions/azure/definitions/dns'
            required:
              - azure
          - title: Azure Private
            additionalProperties: false
            properties:
              azure-private-dns:
                $ref: 'values-schema/definitions.yaml#/definitions/azure/definitions/dns'
            required:
              - azure-private-dns
          - title: Google
            additionalProperties: false
            properties:
              google:
                properties:
                  serviceAccountKey:
                    $ref: 'values-schema/definitions.yaml#/definitions/google/definitions/accountJson'
                    description: A service account key in json format for managing a DNS zone.
                  project:
                    $ref: 'values-schema/definitions.yaml#/definitions/google/definitions/project'
                required: [project, serviceAccountKey]
            required:
              - google
          - title: Digital Ocean
            additionalProperties: false
            properties:
              digitalocean:
                properties:
                  apiToken:
                    type: string
                    x-secret: ''
                required:
                  - apiToken
            required:
              - digitalocean
          - title: Linode
            additionalProperties: false
            properties:
              linode:
                properties:
                  apiToken:
                    type: string
                    x-secret: ''
                required:
                  - apiToken
            required:
              - linode
          - title: CloudFlare
            additionalProperties: false
            properties:
              cloudflare:
                properties:
                  apiToken:
                    type: string
                    x-secret: ''
                  apiSecret:
                    type: string
                    x-secret: ''
                    description: Required when Email is set.
                  email:
                    $ref: 'values-schema/definitions.yaml#/definitions/email'
                    description: Required when Email is set.
                  proxied:
                    type: boolean
                    x-default: true
                oneOf:
                  - required: [apiToken]
                  - required: [apiSecret, email]
                  - not:
                      anyOf:
                        - required: [apiToken]
                        - required: [apiSecret]
                        - required: [email]
            required:
              - cloudflare
          - title: Other
            additionalProperties: false
            properties:
              other:
                description: This option requires configuration for both external-dns as well as cert-manager. No schema validation is available so provide correct data.
                type: object
                properties:
                  name:
                    type: string
                    description: Name of the provider.
                  external-dns:
                    title: YAML for external-dns.
                    type: object
                    description: 'The provider config as provided here: https://github.com/linode/apl-core/blob/main/charts/external-dns/values.yaml'
                  cert-manager:
                    title: YAML for cert-manager.
                    type: object
                    description: 'The dns01 config as provided here: https://cert-manager.io/docs/configuration/acme/dns01/'
                required:
                  - name
                  - external-dns
                  - cert-manager
            required:
              - other
      entrypoint:
        $ref: 'values-schema/definitions.yaml#/definitions/ipV4Address'
        description: Optional. A public IP address that will override (loadbalancer) ip used for registering hosts. This allows for access to private clusters.
  files:
    type: object
    description: 'Custom values for the workload chart.'
    patternProperties:
      '^/|(/[\w-]+)+$':
        type: string
        pattern: ^[^\s]+$
  kms:
    additionalProperties: false
    properties:
      sops:
        oneOf:
          - properties:
              provider:
                type: string
                const: age
              age:
                properties:
                  publicKey:
                    type: string
                  privateKey:
                    type: string
                    x-secret: ''
            required:
              - provider
          - properties:
              provider:
                type: string
                const: aws
              aws:
                properties:
                  keys:
                    description: Comma separated list of one or two ARNs to keys as defined in AWS KMS. One if used for both enc+dec. Two if one for enc, other for dec. (You can specify a role by appending it to the ARN of the key with a + sign.)
                    title: AWS KMS keys
                    type: string
                  accessKey:
                    $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/accessKey'
                  secretKey:
                    $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/secretKey'
                  region:
                    $ref: 'values-schema/definitions.yaml#/definitions/aws/definitions/region'
                required:
                  - accessKey
                  - keys
                  - secretKey
            required:
              - aws
          - properties:
              provider:
                type: string
                const: azure
              azure:
                properties:
                  keys:
                    description: Comma separated list of one or two paths to keys as defined in Azure Keyvault. One if used for both enc+dec. Two if one for enc, other for dec.
                    title: Azure Keyvault keys
                    type: string
                  clientId:
                    $ref: 'values-schema/definitions.yaml#/definitions/azure/definitions/clientId'
                  clientSecret:
                    $ref: 'values-schema/definitions.yaml#/definitions/azure/definitions/clientSecret'
                  tenantId:
                    $ref: 'values-schema/definitions.yaml#/definitions/azure/definitions/tenantId'
                required:
                  - clientId
                  - clientSecret
                  - keys
            required:
              - azure
          - properties:
              provider:
                type: string
                const: google
              google:
                properties:
                  keys:
                    description: Comma separated list of one or two paths to keys as defined in GCP KMS. One if used for both enc+dec. Two if one for enc, other for dec.
                    title: GCP KMS keys
                    type: string
                  accountJson:
                    $ref: 'values-schema/definitions.yaml#/definitions/google/definitions/accountJson'
                  project:
                    $ref: 'values-schema/definitions.yaml#/definitions/google/definitions/project'
                required:
                  - keys
                  - accountJson
                  - project
            required:
              - google
  oidc:
    additionalProperties: false
    description: 'Holds many parts used in different locations. Please see keycloak, grafana, istio and oauth-proxy as those are all consuming (parts of) these settings.'
    properties:
      issuer:
        $ref: 'values-schema/definitions.yaml#/definitions/url'
      clientID:
        $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
      clientSecret:
        type: string
        x-secret: ''
      platformAdminGroupID:
        $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
      allTeamsAdminGroupID:
        $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
      teamAdminGroupID:
        $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
      usernameClaimMapper:
        $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
        description: Claim name from identity provider used by Keycloak to create the username. Best to not change this from the default.
        default: '${CLAIM.upn}'
      subClaimMapper:
        type: string
        description: Claim name passed by Keycloak as a unique user identifier. Best to not change this from the default.
        default: sub
    required:
      - clientID
      - clientSecret
      - issuer
  otomi:
    additionalProperties: false
    properties:
      adminPassword:
        type: string
        x-secret: '{{ randAlphaNum 20 }}'
      isPreInstalled:
        type: boolean
        description: Defines if APL is installed and managed by Linode
        default: false
      aiEnabled:
        type: boolean
        description: Defines if APL enables AI/ML components
        default: false
      globalPullSecret:
        title: Global pullsecret
        description: Will be connected to each "default" service account in all otomi app namespaces.
          Handy for authenticating with DockerHub to avoid rate limiting.
          Also useful when pulling all otomi images from a private repo. (One would need to override all the images in the config first.)
        additionalProperties: false
        properties:
          username:
            $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
          password:
            type: string
            x-secret: ''
          email:
            $ref: 'values-schema/definitions.yaml#/definitions/email'
            default: not@us.ed
          server:
            $ref: 'values-schema/definitions.yaml#/definitions/wordCharacterPattern'
            default: docker.io
        required:
          - username
          - password
      git:
        type: object
        title: Git Configuration
        description: |
          Git configuration for APL values repository.
        additionalProperties: false
        properties:
          repoUrl:
            type: string
            description: |
              The base URL of the Git repository (without credentials). Auto-derived for internal Gitea.
            pattern: '^https?://.+'
          username:
            type: string
            description: |
              Username for authenticating with the Git repository.
              Defaults to 'otomi-admin' for internal Gitea.
          password:
            type: string
            description: Password or token for authenticating with the Git repository
            x-secret: '{{ randAlphaNum 20 }}'
          email:
            type: string
            description: |
              Email address to use for Git commits.
              Defaults to 'pipeline@cluster.local' for internal Gitea.
          branch:
            type: string
            description: The branch to use in the Git repository
      hasExternalDNS:
        description: Set this to true when an external dns zone is available to manage dns records. (Expects required `dns:` fields to be set.)
        default: false
        type: boolean
      hasExternalIDP:
        default: false
        description: Set this to true when bringing your own external IDP such as Azure AD. (Expects required `oidc:` fields to be set.)
        type: boolean
      isMultitenant:
        default: true
        description: Whether to separate team metrics and logs. Disabling this lets everybody be admin and see everything.
        type: boolean
      nodeSelector:
        $ref: 'values-schema/definitions.yaml#/definitions/labelsAnnotations'
        description: 'One or more "label: value" pairs that must exist on one or more nodes, which will force all otomi platform workloads to be scheduled there.'
      version:
        default: latest
        description: 'Best pin this to a valid release version found in the repo.'
        pattern: '(v[0-9]+.[0-9]+.[0-9]+|[a-zA-Z]+[a-zA-Z0-9-])'
      useORCS:
        type: boolean
        description: Defines if the OCI Registry Cache Service (ORCS) is used to cache images from the public registry.
  ingress:
    properties:
      platformClass:
        type: object
        allOf:
          - properties:
              className:
                type: string
                enum: [platform]
          - $ref: 'values-schema/definitions.yaml#/definitions/ingressClassParameters'
      classes:
        type: array
        items:
          allOf:
            - type: object
              properties:
                className:
                  type: string
            - $ref: 'values-schema/definitions.yaml#/definitions/ingressClassParameters'
          required:
            - className
  smtp:
    additionalProperties: false
    properties:
      auth_identity:
        type: string
