{{- $v := .Values }}
{{- $defaultIngressClass := $v.defaultIngressClassName }}

{{- $extraListeners := dict }}
{{- /* Create empty list per ingress class */}}
{{- range $name := $v.ingressClassNames }}
  {{- $_ := set $extraListeners $name list }}
{{- end }}

{{- range $s := $v.services }}
{{- $isKnativeService := dig "ksvc" "predeployed" false $s }}
{{- if not $isKnativeService }}
{{- $cnameDomain := dig "cname" "domain" "" $s }}
{{- $useCname := and ($s.useCname | default false) (ne $cnameDomain "") }}
{{- $ingressClassName := $s.ingressClassName | default $defaultIngressClass }}
{{- $backendName := $s.svc | default $s.name }}
{{- $backendPort := $s.port | default 80 }}
{{- $useTrafficControl := dig "trafficControl" "enabled" false $s }}
{{- $serviceName := $s.name }}
{{- $serviceLabel := $s.name }}
{{- /* Setting the namespace is only valid for the admin team */}}
{{- $serviceNamespace := ternary (get $s "namespace") nil (eq $v.teamId "admin") }}
{{- $defaultHostname := print $serviceName "-" $v.teamId "." $v.domain }}
{{- $headersRequestSet := dig "headers" "request" "set" nil $s }}
{{- $headersResponseSet := dig "headers" "response" "set" nil $s }}
{{- $headersRequestRemove := get $s "removeRequestHeaders" | default nil }}

{{- /* Add specific listener configurations for each cname */}}
{{- if $useCname }}
  {{- $l := (get $extraListeners $ingressClassName) | default list }}
  {{- $l = append $l (dict "name" $serviceName "namespace" $serviceNamespace "hostname" $cnameDomain "secretName" (dig "cname" "tlsSecretName" "" $s)) }}
  {{- $_ := set $extraListeners $ingressClassName $l }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  {{- with $v.httpRouteAnnotations }}
  annotations:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  name: {{ $serviceName }}
  {{- with $serviceNamespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    otomi.io/app: {{ $serviceLabel }}
spec:
  hostnames:
    - {{ $defaultHostname }}
    {{- if $useCname }}
    - {{ $cnameDomain }}
    {{- end }}
  parentRefs:
    {{- if $useCname }}
    - name: {{ $s.ingressClassName | default $defaultIngressClass }}-workloads
      kind: XListenerSet
      group: gateway.networking.x-k8s.io
    {{- end }}
    - name: {{ $s.ingressClassName | default $defaultIngressClass }}
      namespace: istio-system
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - backendRefs:
      {{- if $useTrafficControl }}
        - name: {{ $backendName }}-v1
          port: {{ $backendPort }}
          weight: {{ $s.trafficControl.weightV1 }}
        - name: {{ $backendName }}-v2
          port: {{ $backendPort }}
          weight: {{ $s.trafficControl.weightV2 }}
      {{- else }}
        - name: {{ $backendName }}
          port: {{ $backendPort }}
      {{- end }}
      matches:
      {{- if and $s.paths (gt (len $s.paths) 0) }}
      {{- range $path := $s.paths }}
        - path:
            type: PathPrefix
            value: {{ $path }}
      {{- end }}
      {{- else }}
        - path:
            type: PathPrefix
            value: /
      {{- end }}
      {{- if or $headersRequestSet $headersRequestRemove $headersResponseSet }}
      filters:
        {{- if or $headersRequestSet $headersRequestRemove }}
        - type: RequestHeaderModifier
          requestHeaderModifier:
            {{- with $headersRequestSet }}
            set:
              {{- range . }}
              - name: {{ .name | quote }}
                value: {{ .value | quote }}
              {{- end }}
            {{- end }}
            {{- with $headersRequestRemove }}
            remove:
              {{- . | toYaml | nindent 14 }}
            {{- end }}
        {{- end }}
        {{- with $headersResponseSet }}
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              {{- range . }}
              - name: {{ .name | quote }}
                value: {{ .value | quote }}
              {{- end }}
        {{- end }}
      {{- end }}{{- /* any headers */}}
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: {{ $serviceName }}-internal
  {{- with $serviceNamespace }}
  namespace: {{ . }}
  {{- end }}
spec:
  hosts:
    - {{ $defaultHostname }}
    {{- if $useCname }}
    - {{ $cnameDomain }}
    {{- end }}
  location: MESH_INTERNAL
  ports:
    - number: 80
      name: http
      protocol: HTTP
    - number: 443
      name: https
      protocol: TLS
  resolution: DNS
{{- end }}{{- /* $isKnativeService */}}
{{- end }}{{- /* range services */}}


{{- range $name := $v.ingressClassNames }}

{{- with get $extraListeners $name }}
{{- /* Collect CNAME hostnames for HTTP-HTTPS redirect */}}
{{- $httpRedirects := list }}
---
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: {{ $name }}-workloads
spec:
  parentRef:
    name: {{ $name }}
    namespace: istio-system
    kind: Gateway
    group: gateway.networking.k8s.io
  listeners:
  {{- range $listener := . }}
    - name: http-cname-{{ $listener.name }}
      hostname: {{ $listener.hostname }}
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
      {{- $httpRedirects = append $httpRedirects (dict "name" $listener.name "hostname" $listener.hostname) }}
    - name: https-cname-{{ $listener.name }}
      hostname: {{ $listener.hostname }}
      protocol: HTTPS
      port: 443
      tls:
        certificateRefs:
          - name: {{ $listener.secretName | quote }}
      allowedRoutes:
        namespaces:
          {{- if $listener.namespace }}
          from: All
          {{- else }}
          from: Same
          {{- end }}
  {{- end }}
{{- range $httpRedirects }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}-http-https-redirect
spec:
  hostnames:
    - {{ .hostname }}
  parentRefs:
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: {{ $name }}-workloads
      sectionName: http-cname-{{ .name }}
  rules:
    - filters:
        - requestRedirect:
            scheme: https
            statusCode: 301
          type: RequestRedirect
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}{{- /* range $httpRedirects */}}
{{- end }}{{- /* with $extraListeners */}}
{{- end }}{{- /* range $ingress */}}
