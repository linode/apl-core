{{- $v := .Values }}
{{- $a := $v.apps.argocd }}
{{- $urls := list }}
{{- range $i, $item := $v.workloads }}
  {{- $urls = append $urls $item.url }}
{{- end }}
{{- if $v.gitOps.teamRepoUrl }}
{{- $urls = append $urls $v.gitOps.teamRepoUrl }}
{{- end }}
{{- $urls = append $urls $v.gitOps.valuesRepoUrl }}
{{- $urls = sortAlpha (uniq $urls) }}
{{ $defaultArgocdAction := "*" }}

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-{{ $v.teamId }}
  namespace: argocd
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: ArgoCD project for team {{ $v.teamId }}
  # Allow manifests to deploy from any Git repos
  sourceRepos:
  {{- $urls | toYaml | nindent 4 }}

  # Only permit applications to deploy to the guestbook namespace in the same cluster
  destinations:
  - namespace: team-{{ $v.teamId }}
    server: https://kubernetes.default.svc
  # Deny all cluster-scoped resources from being created
  {{- if eq $v.teamId "admin" }}
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  {{- else }}
  clusterResourceWhitelist: []
  {{- end }}
  # Allow all namespaced-scoped resources to be created, except for ResourceQuota, LimitRange, NetworkPolicy
  namespaceResourceBlacklist:
  - group: ''
    kind: ResourceQuota
  - group: ''
    kind: LimitRange
  - group: ''
    kind: NetworkPolicy
  - group: networking.istio.io
    kind: VirtualService
  - group: networking.istio.io
    kind: Sidecar
  - group: networking.istio.io
    kind: Gateway

  roles:
  - name: team-member
    description: Team member privileges to team-{{ $v.teamId }}
    policies:
    - p, proj:team-{{ $v.teamId }}:team-member, applications, {{ $defaultArgocdAction }}, team-{{ $v.teamId }}/*, allow
    - p, proj:team-{{ $v.teamId }}:team-member, applicationsets, {{ $defaultArgocdAction }}, team-{{ $v.teamId }}/*, allow
    - p, proj:team-{{ $v.teamId }}:team-member, repositories, {{ $defaultArgocdAction }}, team-{{ $v.teamId }}/*, allow
    - p, proj:team-{{ $v.teamId }}:team-member, logs, {{ $defaultArgocdAction }}, team-{{ $v.teamId }}/*, allow
    - p, proj:team-{{ $v.teamId }}:team-member, exec, {{ $defaultArgocdAction }}, team-{{ $v.teamId }}/*, allow
    - p, proj:team-{{ $v.teamId }}:team-member, clusters, {{ $defaultArgocdAction }}, team-{{ $v.teamId }}/*, allow
    groups:
    - team-{{ $v.teamId }}

  # A role which provides read-only access to all applications in the project
  - name: read-only
    description: Read-only privileges to team-{{ $v.teamId }}
    policies:
    - p, proj:team-{{ $v.teamId }}:read-only, applications, get, team-{{ $v.teamId }}/*, allow
    groups:
    - team-viewer
  - name: ci-role
    description: Sync privileges for team applications
    policies:
    - p, proj:team-{{ $v.teamId }}:ci-role, applications, sync, team-{{ $v.teamId }}/*, allow
    # NOTE: JWT tokens can only be generated by the API server and the token is not persisted
    # anywhere by Argo CD. It can be prematurely revoked by removing the entry from this list.
    jwtTokens:
    - iat: 1535390316

