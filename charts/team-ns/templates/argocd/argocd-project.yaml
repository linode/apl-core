{{- $v := .Values }}
{{- $a := $v.apps.argocd }}
{{- $urls := list }}
{{- range $i, $item := $v.workloads }}
  {{- $urls = append $urls $item.url }}
{{- end }}
{{- if $v.gitOps.teamRepoUrl }}
{{- $urls = append $urls $v.gitOps.teamRepoUrl }}
{{- end }}
{{- $urls = append $urls $v.gitOps.valuesRepoUrl }}
{{- $urls = sortAlpha (uniq $urls) }}
{{- $resourceActions := "*" }}
{{- $projectName := printf "team-%s" $v.teamId }}
{{- $targetNamespace := printf "team-%s" $v.teamId }}
{{- $oidcGroup := printf "team-%s" $v.teamId }}
{{- $argoRoleName := printf "team-%s" $v.teamId }}
{{- $argoObjects := printf "%s/*" $projectName }}


apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ $projectName }}
  namespace: argocd
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: ArgoCD project for team {{ $v.teamId }}
  # Allow manifests to deploy from any Git repos
  sourceRepos:
  {{- $urls | toYaml | nindent 4 }}

  # Only permit applications to deploy to the guestbook namespace in the same cluster
  destinations:
  - namespace: {{ $targetNamespace }}
    server: https://kubernetes.default.svc
  # Deny all cluster-scoped resources from being created
  {{- if eq $v.teamId "admin" }}
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  {{- else }}
  clusterResourceWhitelist: []
  {{- end }}
  # Allow all namespaced-scoped resources to be created, except for ResourceQuota, LimitRange, NetworkPolicy
  namespaceResourceBlacklist:
  - group: ''
    kind: ResourceQuota
  - group: ''
    kind: LimitRange
  - group: ''
    kind: NetworkPolicy
  - group: networking.istio.io
    kind: VirtualService
  - group: networking.istio.io
    kind: Sidecar
  - group: networking.istio.io
    kind: Gateway

  roles:
  - name: {{ $argoRoleName }}
    description: Team member privileges to {{ $projectName }}
    policies:
    - p, proj:{{ $projectName }}:{{ $argoRoleName }}, applications, {{ $resourceActions }}, {{ $argoObjects }}, allow
    - p, proj:{{ $projectName }}:{{ $argoRoleName }}, applicationsets, {{ $resourceActions }}, {{ $argoObjects }}, allow
    - p, proj:{{ $projectName }}:{{ $argoRoleName }}, logs, {{ $resourceActions }}, {{ $argoObjects }}, allow
    - p, proj:{{ $projectName }}:{{ $argoRoleName }}, exec, {{ $resourceActions }}, {{ $argoObjects }}, allow
    groups:
    - {{ $oidcGroup }}

  # A role which provides read-only access to all applications in the project
  - name: read-only
    description: Read-only privileges to {{ $projectName }}
    policies:
    - p, proj:{{ $projectName }}:read-only, applications, get, {{ $argoObjects }}, allow
    groups:
    - team-viewer
  - name: ci-role
    description: Sync privileges for team applications
    policies:
    - p, proj:{{ $projectName }}:ci-role, applications, sync, {{ $argoObjects }}, allow
    # NOTE: JWT tokens can only be generated by the API server and the token is not persisted
    # anywhere by Argo CD. It can be prematurely revoked by removing the entry from this list.
    jwtTokens:
    - iat: 1535390316

