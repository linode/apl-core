apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: console
  namespace: {{ .Release.Namespace }}
spec:
  hostnames:
    - console.{{ .Values.clusterDomainSuffix }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform
      namespace: istio-system
      sectionName: https
  rules:
    - backendRefs:
        - name: {{ include "otomi-console.fullname" . }}
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /
