apiVersion: v1
kind: Service
metadata:
  name: git-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "git-server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
