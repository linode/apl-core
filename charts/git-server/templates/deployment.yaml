apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "git-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "git-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "git-server.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: init-repo
          image: {{ .Values.initImage.git.repository }}:{{ .Values.initImage.git.tag }}
          imagePullPolicy: {{ .Values.initImage.git.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              if [ ! -d /data/{{ .Values.repoName }} ]; then
                mkdir -p /data/{{ dir .Values.repoName }}
                git init --bare /data/{{ .Values.repoName }}
                git -C /data/{{ .Values.repoName }} config http.receivepack true
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        - name: init-auth
          image: {{ .Values.initImage.alpine.repository }}:{{ .Values.initImage.alpine.tag }}
          imagePullPolicy: {{ .Values.initImage.alpine.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              apk add --no-cache apache2-utils
              htpasswd -Bbc /auth/htpasswd "${GIT_USERNAME}" "${GIT_PASSWORD}"
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: git-server-credentials
                  key: username
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: git-server-credentials
                  key: password
          volumeMounts:
            - name: auth
              mountPath: /auth
      containers:
        - name: git-server
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
            - name: auth
              mountPath: /auth
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: git-server-data
        - name: auth
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: git-server-nginx-config
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}
