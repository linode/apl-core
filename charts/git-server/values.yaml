repoName: otomi/values.git

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

initImage:
  git:
    repository: alpine/git
    tag: latest
    pullPolicy: IfNotPresent
  alpine:
    repository: alpine
    tag: latest
    pullPolicy: IfNotPresent

persistence:
  size: 1Gi
  storageClass: ""

auth:
  username: otomi-admin
  password: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  port: 80
