repoName: otomi/values.git
branchName: main

image:
  repository: docker.io/clubbers1892/simple-git-server
  tag: v0.1.1
  pullPolicy: IfNotPresent

initImage:
  git:
    repository: alpine/git
    tag: v2.52.0
    pullPolicy: IfNotPresent

persistence:
  size: 256Mi
  storageClass: ""

auth:
  username: otomi-admin
  password: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  port: 80
