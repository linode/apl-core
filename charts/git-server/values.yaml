repoName: otomi/values.git
branchName: main

image:
  repository: linode/apl-http-git-server
  tag: main
  pullPolicy: IfNotPresent

initImage:
  git:
    repository: alpine/git
    tag: v2.52.0
    pullPolicy: IfNotPresent

persistence:
  size: 256Mi
  storageClass: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  port: 80
