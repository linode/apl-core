{{- if and .Values.rbac.create (not .Values.rbac.useExistingRole) .Values.rbac.namespaced  -}}
{{- range $namespace := (append .Values.rbac.namespaces (include "grafana.namespace" .)) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "grafana.fullname" $ }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "grafana.labels" $ | nindent 4 }}
  {{- with $.Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if or $.Values.sidecar.dashboards.enabled $.Values.sidecar.datasources.enabled $.Values.sidecar.plugins.enabled $.Values.rbac.extraRoleRules }}
rules:
  {{- if or $.Values.sidecar.dashboards.enabled $.Values.sidecar.datasources.enabled $.Values.sidecar.plugins.enabled }}
  - apiGroups: [""] # "" indicates the core API group
    resources: ["configmaps", "secrets"]
    verbs: ["get", "watch", "list"]
  {{- end }}
  {{- with $.Values.rbac.extraRoleRules }}
  {{- toYaml . | nindent 2 }}
  {{- end}}
{{- else }}
rules: []
{{- end }}
{{- end }}
{{- end }}
