{{- range $name, $listenerSet := .Values.listenerSet }}
{{- if $listenerSet.enabled }}
---
apiVersion: {{ $listenerSet.apiVersion | default "gateway.networking.k8s.io/v1" }}
kind: ListenerSet
metadata:
  {{- with $listenerSet.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  name: {{ template "grafana.fullname" $ }}{{ if ne $name "main" }}-{{ $name }}{{ end }}
  namespace: {{ template "grafana.namespace" $ }}
  labels:
    {{- include "grafana.labels" $ | nindent 4 }}
    {{- with $listenerSet.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRef:
    {{- toYaml $listenerSet.parentRef | nindent 4 }}
  listeners:
    {{- toYaml $listenerSet.listeners | nindent 4 }}
{{- end }}
{{- end }}
