{{- $v := .Values }}
{{- range $gateway := $v.gateways }}
{{- range $listener := $gateway.listeners }}
{{- if eq $listener.protocol "HTTP" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $gateway.name }}-{{ $listener.name }}-https-redirect
spec:
  hostnames:
    - {{ $listener.hostname | quote }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gateway.name }}
      sectionName: {{ $listener.name }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}{{/* eq $listener.protocol "HTTP" */}}
{{- end }}{{/* range $listener */}}
{{- end }}{{/* range $gateway */}}
