{{- if .Values.certificateSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argocd-image-updater.fullname" . }}-tls
  namespace: {{ include "argocd-image-updater.namespace" . | quote }}
  labels:
    {{- include "argocd-image-updater.labels" . | nindent 4 }}
    {{- with .Values.certificateSecret.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.certificateSecret.annotations }}
  annotations:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.certificateSecret.crt | b64enc | quote }}
  tls.key: {{ .Values.certificateSecret.key | b64enc | quote }}
{{- end }}
