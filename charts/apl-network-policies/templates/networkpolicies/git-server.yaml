{{- if .Values.netpols.gitServer }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: git-server-platform-policy
  namespace: git-server
  labels:
    {{- include "apl-network-policies.labels" . | nindent 4 }}
    app: git-server
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
      # Allow access from public ingress gateway
      {{- with .Values.ingressGatewaySelectors }}
      {{- . | toYaml | nindent 8 }}
      {{- end }}
    # Allow APL operator access
    - from:
        - namespaceSelector:
            matchLabels:
              name: apl-operator
    # Allow ArgoCD GitOps access
    - from:
        - namespaceSelector:
            matchLabels:
              name: argocd
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-repo-server
    # Allow APL API access
    - from:
        - namespaceSelector:
            matchLabels:
              name: otomi
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otomi-api
{{- end }}
