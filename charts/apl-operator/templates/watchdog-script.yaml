apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apl-operator.fullname" . }}-watchdog
  labels:
    {{- include "apl-operator.labels" . | nindent 4 }}
data:
  watchdog.sh: |
    #!/bin/sh
    set -eu

    STALE_THRESHOLD_SECONDS=900  # 15 minutes
    CHECK_INTERVAL_SECONDS=60
    STARTUP_GRACE_SECONDS=180    # 3 minutes — let the operator do its first apply

    CM_NAME="apl-operator-state"
    K8S_API="https://kubernetes.default.svc"
    SA_TOKEN="/var/run/secrets/kubernetes.io/serviceaccount/token"
    SA_CERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    log() { echo "[$(date -u +%H:%M:%S)] $*"; }

    get_timestamp() {
      curl -s \
        --cacert "$SA_CERT" \
        -H "Authorization: Bearer $(cat "$SA_TOKEN")" \
        "$K8S_API/api/v1/namespaces/$MY_POD_NAMESPACE/configmaps/$CM_NAME" \
      | grep -o '"timestamp":"[^"]*"' \
      | cut -d'"' -f4
    }

    delete_pod() {
      curl -s -X DELETE \
        --cacert "$SA_CERT" \
        -H "Authorization: Bearer $(cat "$SA_TOKEN")" \
        "$K8S_API/api/v1/namespaces/$MY_POD_NAMESPACE/pods/$MY_POD_NAME" \
        > /dev/null
    }

    check_once() {
      local timestamp ts_clean now age

      timestamp=$(get_timestamp)

      if [ -z "$timestamp" ]; then
        log "ConfigMap '$CM_NAME' not found or has no timestamp — skipping"
        return
      fi

      # Normalise ISO 8601 to "YYYY-MM-DD HH:MM:SS" for BusyBox date compatibility
      ts_clean=$(echo "$timestamp" | sed 's/\.[0-9]*Z*$//' | tr 'T' ' ')
      now=$(date -u +%s)
      age=$(( now - $(date -u -d "$ts_clean" +%s) ))

      log "Operator state age: ${age}s (threshold: ${STALE_THRESHOLD_SECONDS}s)"

      if [ "$age" -gt "$STALE_THRESHOLD_SECONDS" ]; then
        log "Timestamp is stale — deleting pod '$MY_POD_NAME' to trigger a restart"
        delete_pod
      fi
    }

    log "Waiting ${STARTUP_GRACE_SECONDS}s before first check (startup grace period)"
    sleep "$STARTUP_GRACE_SECONDS"

    log "Starting watchdog loop (check every ${CHECK_INTERVAL_SECONDS}s)"
    while true; do
      check_once
      sleep "$CHECK_INTERVAL_SECONDS"
    done
