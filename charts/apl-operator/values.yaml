# Default values for apl-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: docker.io/linode/apl-core
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: main

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service Account requires access to gitea pod to edit the oauth through CLI commands
serviceAccount:
  create: true
  name: "apl-operator"
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi


## APL Operator configuration
operator:
  # Git organization/user name (will be configured during installation)
  gitOrg: "otomi"
  # Git repository name (will be configured during installation)
  gitRepo: "values"
  # Polling interval for git changes (milliseconds)
  pollIntervalMs: 1000
  # Reconcile interval for applying changes (milliseconds)
  reconcileIntervalMs: 300000

nodeSelector: {}

tolerations: []

affinity: {}

command: []

commandArgs: []

env: {}

kms: {}
# example:
#  sops:
#    age:
#      privateKey: "AGE-SECRET-KEY-EXAMPLExxxxxxxxxxxxxxxxxxxxxxxx"
