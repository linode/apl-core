{{- if .Values.manager.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "opentelemetry-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller-manager
  name: {{ include "opentelemetry-operator.fullname" . }}-config
  namespace: {{ template "opentelemetry-operator.namespace" . }}
data:
  config.yaml: |
    {{- tpl (toYaml .Values.manager.config) . | nindent 4 }}
{{- end }}
