{{- with .Values.monitoring.rules }}
{{- if and ($.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PrometheusRule") .enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "loki.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ include "loki.fullname" $ }}-loki-rules
  namespace: {{ .namespace | default (include "loki.namespace" $) }}
spec:
  groups:
    {{- range (tpl ($.Files.Get "src/rules.yaml.tpl") $ | fromYaml).groups }}
    - name: {{ .name }}
      rules:
        {{- toYaml .rules | nindent 8 }}
    {{- end }}
    {{- range .additionalGroups }}
    - name: {{ .name }}
      rules:
        {{- toYaml .rules | nindent 8 }}
    {{- end }}
{{- end }}
{{- end }}
