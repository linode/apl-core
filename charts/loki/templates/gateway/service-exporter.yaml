{{- if and .Values.gateway.enabled .Values.gateway.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loki.gatewayFullname" . }}-exporter
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.gatewayLabels" . | nindent 4 }}
    {{- with .Values.loki.serviceLabels }}
    {{- toYaml . | nindent 4}}
    {{- end }}
    {{- with .Values.gateway.metrics.service.labels }}
    {{- toYaml . | nindent 4}}
    {{- end }}
  annotations:
    {{- with .Values.loki.serviceAnnotations }}
    {{- toYaml . | nindent 4}}
    {{- end }}
    {{- with .Values.gateway.metrics.service.annotations }}
    {{- toYaml . | nindent 4}}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 4040
      targetPort: http-metrics
      protocol: TCP
  selector:
    {{- include "loki.gatewaySelectorLabels" . | nindent 4 }}
{{- end }}
