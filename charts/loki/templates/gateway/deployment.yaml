{{- if and .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loki.gatewayFullname" . }}
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.gatewayLabels" . | nindent 4 }}
  {{- if or (not (empty .Values.loki.annotations)) (not (empty .Values.gateway.annotations))}}
  annotations:
    {{- with .Values.loki.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.gateway.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
{{- if and (not .Values.gateway.autoscaling.enabled) (not .Values.gateway.kedaAutoscaling.enabled) }}
  replicas: {{ .Values.gateway.replicas }}
{{- end }}
{{- with .Values.gateway.deploymentStrategy }}
  strategy:
{{ toYaml . | trim | indent 4 }}
{{- end }}
  revisionHistoryLimit: {{ .Values.loki.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "loki.gatewaySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "loki.configMapOrSecretContentHash" (dict "ctx" . "name" "/gateway/configmap.yaml") }}
        {{- with .Values.gateway.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with .Values.loki.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.gateway.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "loki.gatewaySelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "loki.serviceAccountName" (dict "ctx" . "component" .Values.gateway "target" "gateway" ) }}
      {{- if (kindIs "bool" .Values.gateway.automountServiceAccountToken) }}
      automountServiceAccountToken: {{ .Values.gateway.automountServiceAccountToken }}
      {{- else if (kindIs "bool" .Values.defaults.automountServiceAccountToken) }}
      automountServiceAccountToken: {{ .Values.defaults.automountServiceAccountToken }}
      {{- end }}
      {{- $esl := include "loki.enableServiceLinks" (dict "component" .Values.gateway "ctx" .) }}
      {{- if $esl }}
      {{ $esl }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end -}}
      {{- if and (semverCompare ">=1.33-0" (include "loki.kubeVersion" .)) (kindIs "bool" .Values.gateway.hostUsers) }}
      hostUsers: {{ .Values.gateway.hostUsers }}
      {{- end }}
      {{- include "loki.gatewayPriorityClassName" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.gateway.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      containers:
        - name: nginx
          image: {{ include "loki.image" (dict "ctx" . "component" .Values.gateway.image) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.containerPort }}
              protocol: TCP
          {{- with .Values.gateway.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.gateway.containerSecurityContext | nindent 12 }}
          {{- with .Values.gateway.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/nginx
            {{- if .Values.gateway.basicAuth.enabled }}
            - name: auth
              mountPath: /etc/nginx/secrets
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: docker-entrypoint-d-override
              mountPath: /docker-entrypoint.d
            {{- if .Values.gateway.extraVolumeMounts }}
            {{- toYaml .Values.gateway.extraVolumeMounts | nindent 12 }}
            {{- end }}
          {{- with (coalesce .Values.gateway.resources .Values.defaults.resources) }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.gateway.metrics.enabled }}
        - name: exporter
          image: {{ include "loki.image" (dict "ctx" . "component" .Values.gateway.metrics.image) }}
          imagePullPolicy: {{ .Values.gateway.metrics.image.pullPolicy }}
          ports:
            - containerPort: 4040
              name: http-metrics
            - containerPort: 8514
              name: syslog
          args:
            - --nginx.scrape-url
            - http://127.0.0.1:{{ .Values.gateway.containerPort }}/stub_status
            - --preset
            - loki
            {{- with .Values.gateway.metrics.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.gateway.metrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.metrics.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.metrics.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.metrics.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.gateway.metrics.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config.yaml
              subPath: access-log-exporter.yaml
      {{- end }}
        {{- if .Values.gateway.extraContainers }}
        {{- toYaml .Values.gateway.extraContainers | nindent 8}}
        {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- tpl ( . | toYaml) $ | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.gateway.dnsConfig .Values.defaults.dnsConfig .Values.loki.dnsConfig) }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.gateway.nodeSelector .Values.defaults.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl ( . | toYaml) $ | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.gateway.tolerations .Values.defaults.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "loki.gatewayFullname" . }}
        {{- if .Values.gateway.basicAuth.enabled }}
        - name: auth
          secret:
            secretName: {{ include "loki.gatewayAuthSecret" . }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: docker-entrypoint-d-override
          emptyDir: {}
        {{- if .Values.gateway.extraVolumes }}
        {{- toYaml .Values.gateway.extraVolumes | nindent 8 }}
        {{- end }}
{{- end }}
